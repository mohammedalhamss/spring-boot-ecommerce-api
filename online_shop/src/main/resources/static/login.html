<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
	<style>
	:root {
	    --primary: #4f46e5;
	    --primary-hover: #4338ca;
	    --bg: #f3f4f6;
	    --card: #ffffff;
	    --text: #111827;
	    --muted: #6b7280;
	    --border: #e5e7eb;
	}

	* {
	    box-sizing: border-box;
	}

	body {
	    margin: 0;
	    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
	    background: linear-gradient(135deg, #eef2ff, #f3f4f6);
	    min-height: 100vh;
	    display: flex;
	    align-items: center;
	    justify-content: center;
	}

	.login-box {
	    background: var(--card);
	    width: 100%;
	    max-width: 360px;
	    padding: 32px;
	    border-radius: 14px;
	    box-shadow: 
	        0 20px 25px rgba(0,0,0,0.08),
	        0 10px 10px rgba(0,0,0,0.04);
	    animation: fadeIn 0.5s ease;
	}

	@keyframes fadeIn {
	    from {
	        opacity: 0;
	        transform: translateY(10px);
	    }
	    to {
	        opacity: 1;
	        transform: translateY(0);
	    }
	}

	.login-box h2 {
	    margin: 0 0 24px;
	    text-align: center;
	    color: var(--text);
	    font-size: 1.6rem;
	    font-weight: 600;
	}

	.login-box form {
	    display: flex;
	    flex-direction: column;
	    gap: 16px;
	}

	.login-box input {
	    padding: 12px 14px;
	    border-radius: 10px;
	    border: 1px solid var(--border);
	    font-size: 0.95rem;
	    outline: none;
	    transition: border-color 0.2s, box-shadow 0.2s;
	}

	.login-box input::placeholder {
	    color: var(--muted);
	}

	.login-box input:focus {
	    border-color: var(--primary);
	    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
	}

	.login-box button {
	    margin-top: 8px;
	    padding: 12px;
	    border-radius: 10px;
	    border: none;
	    background: var(--primary);
	    color: #fff;
	    font-size: 1rem;
	    font-weight: 600;
	    cursor: pointer;
	    transition: background 0.2s, transform 0.1s, box-shadow 0.1s;
	}

	.login-box button:hover {
	    background: var(--primary-hover);
	}

	.login-box button:active {
	    transform: translateY(1px);
	    box-shadow: 0 5px 10px rgba(0,0,0,0.15) inset;
	}

	.login-footer {
	    margin-top: 16px;
	    text-align: center;
	    font-size: 0.85rem;
	    color: var(--muted);
	}
	</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
	<form action="/login" method="post">
	  <input type="text" name="username" placeholder="Username" required>
	  <input type="password" name="password" placeholder="Password" required>
	  <button type="submit">Login</button>
	</form>

</div>

</body>
</html>
