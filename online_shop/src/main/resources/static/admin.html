<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<header class="header">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-shopping-cart"></i>
            <span>Online Shop Admin</span>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-link active" data-section="products">Products</a>
            <a href="#" class="nav-link" data-section="users">Users</a>
            <a href="#" class="nav-link" data-section="payments">Payments</a>
            <a href="#" class="nav-link" data-section="statements">Statements</a>
        </div>
		<div class="user-menu">
		           <button id="logout-btn" class="btn btn-logout">
		               <i class="fas fa-sign-out-alt"></i> Logout
		           </button>
		       </div>
    </nav>
</header>

<main class="main-content">
    <!-- Products Section -->
    <section id="products" class="content-section active">
        <div class="section-header">
            <h2><i class="fas fa-box"></i> Products</h2>
            <button class="btn btn-primary" id="add-product-btn">
                <i class="fas fa-plus"></i> Add Product
            </button>
        </div>
        <div class="products-grid" id="products-container"></div>
    </section>

    <!-- Users Section -->
    <section id="users" class="content-section">
        <div class="section-header">
            <h2><i class="fas fa-users"></i> Users</h2>
            <button class="btn btn-primary" id="add-user-btn">
                <i class="fas fa-user-plus"></i> Add User
            </button>
        </div>
        <div class="users-list" id="users-container"></div>
    </section>

    <!-- Payments Section -->
    <section id="payments" class="content-section">
        <div class="section-header">
            <h2><i class="fas fa-credit-card"></i> Payments</h2>
            <button class="btn btn-primary" id="make-payment-btn">
                <i class="fas fa-money-bill-wave"></i> Make Payment
            </button>
        </div>
        <div class="payments-list" id="payments-container"></div>
    </section>

    <!-- Statements Section -->
    <section id="statements" class="content-section">
        <div class="section-header">
            <h2><i class="fas fa-file-invoice-dollar"></i> Payment Statements</h2>
        </div>
        <div class="statements-list" id="statements-container"></div>
    </section>
</main>

<!-- Modal (for forms or details) -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<!-- Loading Spinner -->
<div class="loading-spinner" id="loading">
    <div class="spinner"></div>
</div>

<!-- JS Modules -->
<script type="module" src="api.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
